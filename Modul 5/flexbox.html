<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belajar Flex Box</title>
    <style>
        .wadah-flex {
            display: flex; /* fleksibel */
            background-color: #f0f0f0;
            gap: 10px;
            padding: 10px;
        }

        /* Skenario 2 – style untuk setiap anak div */
        .wadah-flex > div {
            background-color: #2196F3;
            color: white;
            margin: 10px;
            padding: 10px;
            font-size: 30px;
        }
        
    </style>
</head>
<body>
    <div class="wadah-flex">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <p>Kesimpulan skenario 2: Flex container mengatur posisi child secara horizontal.</p>
</body>
</html>
