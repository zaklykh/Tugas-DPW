<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-areas:
                "header header header"
                "menu main right"
                "footer footer footer";
            grid-gap: 10px;
            padding: 10px;
        }

        .header { grid-area: header; background: lightblue; padding: 20px;}
        .menu { grid-area: menu; background: lightgreen; padding: 20px;}
        .main { grid-area: main; background: lightyellow; padding: 20px;}
        .right { grid-area: right; background: lightcoral; padding: 20px;}
        .footer { grid-area: footer; background: lightgray; padding: 20px;}
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="header">Header</div>
        <div class="menu">Menu</div>
        <div class="main">Main</div>
        <div class="right">Right</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
