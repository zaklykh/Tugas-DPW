<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Penjadwal Pertemuan</title>
    <style>
        body { font-family: "Times New Roman", serif; }
        fieldset { margin-bottom: 20px; width: 500px; border: 1px solid #ccc; }
        legend { font-weight: normal; }
        .row { margin-bottom: 10px; display: flex; align-items: center; }
        label { width: 180px; display: inline-block; }
        input[type="text"], input[type="tel"], input[type="email"], input[type="date"], input[type="time"] {
            padding: 2px;
        }
    </style>
</head>
<body>

    <h1>Form Penjadwal Pertemuan</h1>

    <form action="#" method="post">
        <fieldset>
            <legend>Informasi Pribadi</legend>
            <div class="row">
                <label for="nama">Nama</label>
                <input type="text" id="nama" name="nama" required>
            </div>
            <div class="row">
                <label for="telp">No. Telepon</label>
                <input type="tel" id="telp" name="telp" 
                       pattern="[0-9]{4}-[0-9]{6,}" 
                       placeholder="XXXX-XXXXXX" required>
            </div>
            <div class="row">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" 
                       placeholder="nama@domain.com" required>
            </div>
            <div class="row">
                <label for="tgl_lahir">Tanggal Lahir</label>
                <input type="date" id="tgl_lahir" name="tgl_lahir" 
                       min="1987-01-01" max="1993-01-01" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Permintaan Pertemuan</legend>
            <div class="row">
                <label for="tujuan">Tujuan Pertemuan</label>
                <input type="text" id="tujuan" name="tujuan" required>
            </div>
            <div class="row">
                <label for="urgensi">Tingkat Kepentingan</label>
                <span>Tidak Penting</span>
                <input type="range" id="urgensi" name="urgensi" min="0" max="10" step="1" value="5">
                <span>Mendesak</span>
            </div>
            <div class="row">
                <label for="tgl_pertemuan">Tanggal</label>
                <input type="date" id="tgl_pertemuan" name="tgl_pertemuan" required>
            </div>
            <div class="row">
                <label for="waktu">Waktu</label>
                <input type="time" id="waktu" name="waktu" 
                       min="17:00" max="21:00" required>
                <span style="margin-left: 5px;">WIB</span>
            </div>
        </fieldset>

        <button type="submit">Submit</button>
    </form>

    <script>
        // Script untuk memastikan tanggal pertemuan harus di atas hari ini
        const today = new Date();
        today.setDate(today.getDate() + 1); // Besok
        const tomorrow = today.toISOString().split('T')[0];
        document.getElementById('tgl_pertemuan').setAttribute('min', tomorrow);
    </script>

</body>
</html>
