<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Selector</title>
    <style>
        /* Selektor terhadap elemen p */
        p {
            text-align: center;
            color: aqua;
            border: 1px solid black;
            padding: 10px;
        }

        /* Selektor terhadap elemen dengan atribut id="kalimat" */
        #kalimat {
            text-align: left;
            color: red;
            background-color: #eeeeee;
        }

        /* Selektor terhadap elemen dengan atribut class="center" */
        .center {
            text-align: center;
            color: chocolate;
        }

        /* Selektor terhadap elemen p yang mempunyai atribut class="tengah" */
        p.tengah {
            text-align: center;
            color: darkmagenta;
            display: block;
            background-color: #777777;
        }
    </style>
</head>
<body>
    <p>Penggunaan CSS sangat membantu web desainer dalam menyusun halaman yang konsisten.</p>
    <p id="kalimat">Dalam penulisan CSS sangat sederhana namun powerful dalam desain.</p>
    <p class="center">CSS mempunyai sifat pewarisan secara default (inheritance).</p>
    <p class="tengah">Ini adalah hasil selector dengan elemen p dengan class tengah.</p>
</body>
</html>
