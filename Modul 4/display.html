<html>
<head>
    <style>
        div {
            border: 1px solid;
            margin: 0 auto; /* Menengahkan elemen div */
            height: 100px;
            width: 500px;
            background: skyblue;
        }
        span {
            display: block; /* Mengubah span (inline) menjadi block */
            background: red;
        }
    </style>
</head>
<body>
    <div>
        Ini adalah elemen pertama menggunakan DIV
        <div>Ini DIV di dalam DIV namun membuat elemen blok baru</div>
        <span>Ini SPAN di dalam DIV yang dipaksa menjadi elemen blok baru</span>
    </div>
</body>
</html>
